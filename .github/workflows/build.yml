name: Build All Projects

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-modsystem:
    name: Build ModSystem (v3.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
      - name: Restore NuGet packages
        run: nuget restore "ModSystem/DSX_ModSystem_Example.sln"
      - name: Build ModSystem
        run: msbuild "ModSystem/DSX_ModSystem_Example.sln" /p:Configuration=Release /p:Platform="Any CPU"
      - name: Upload ModSystem artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModSystem-v3.1
          path: ModSystem/bin/Release/

  build-udp-v2:
    name: Build UDP Example v2.0
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
      - name: Restore NuGet packages
        run: nuget restore "UDP Example (C#) for v2.0/DSX_UDP_Example/DSX_UDP_Example.sln"
      - name: Build UDP Example v2.0
        run: msbuild "UDP Example (C#) for v2.0/DSX_UDP_Example/DSX_UDP_Example.sln" /p:Configuration=Release /p:Platform="Any CPU"
      - name: Upload UDP v2.0 artifact
        uses: actions/upload-artifact@v4
        with:
          name: UDP-Example-v2.0
          path: "UDP Example (C#) for v2.0/DSX_UDP_Example/bin/Release/"

  build-udp-example:
    name: Build UDP Example (Client/Server/Shared)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET Core 3.1
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '3.1.x'
      - name: Restore
        run: dotnet restore "UDPExample/UDPExample.sln"
      - name: Build
        run: dotnet build "UDPExample/UDPExample.sln" --configuration Release --no-restore
      - name: Upload UDP Example artifact
        uses: actions/upload-artifact@v4
        with:
          name: UDP-Example-v3
          path: UDPExample/*/bin/Release/

  build-hidhide-api:
    name: Build Nefarius.Drivers.HidHide
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore "Nefarius.Drivers.HidHide/Nefarius.Drivers.HidHide.sln"
      - name: Build
        run: dotnet build "Nefarius.Drivers.HidHide/Nefarius.Drivers.HidHide.sln" --configuration Release --no-restore
      - name: Upload HidHide API artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nefarius-Drivers-HidHide
          path: Nefarius.Drivers.HidHide/*/bin/Release/

  build-autobt:
    name: Build AutoBT
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
      - name: Restore NuGet packages
        run: nuget restore "AutoBT/Source/AutoBT.sln"
      - name: Build AutoBT
        run: msbuild "AutoBT/Source/AutoBT.sln" /p:Configuration=Release /p:Platform="Any CPU"
      - name: Upload AutoBT artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoBT
          path: AutoBT/Source/bin/Release/

  build-v4:
    name: Build DSX V4 (Unified)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore "V4/DSX_V4.sln"
      - name: Build
        run: dotnet build "V4/DSX_V4.sln" --configuration Release --no-restore
      - name: Upload V4 Client/Server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DSX-V4-Client-Server
          path: |
            V4/Client/bin/Release/
            V4/Server/bin/Release/

  build-v4-gui:
    name: Build DSX V4 GUI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore "V4/DSX_V4_GUI.sln"
      - name: Build
        run: dotnet build "V4/DSX_V4_GUI.sln" --configuration Release --no-restore
      - name: Upload V4 GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: DSX-V4-GUI
          path: V4/GUI/bin/Release/

  build-v5:
    name: Build DSX V5 (All-in-One)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore "V5/DSX_V5.csproj"
      - name: Build
        run: dotnet build "V5/DSX_V5.csproj" --configuration Release --no-restore
      - name: Upload V5 artifact
        uses: actions/upload-artifact@v4
        with:
          name: DSX-V5-All-in-One
          path: V5/bin/Release/
